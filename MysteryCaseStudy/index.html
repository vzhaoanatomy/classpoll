<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mystery Case Study Generator — Honors Anatomy &amp; Physiology</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #f4f1ea;
      --panel: #ffffff;
      --ink: #2b2a28;
      --muted: #6f6a63;
      --line: #e3ddd1;
      --accent: #3f6d8e;      /* slate blue */
      --accent-dark: #2f5470;
      --accent-soft: #e8f0f6;
      --teacher: #8a5a44;      /* warm clay for teacher-only */
      --teacher-soft: #f6ece6;
      --gold: #b08a3e;
      --good: #4b7a52;
      --bad: #b4452f;
      --bad-soft: #fbeae5;
      --radius: 14px;
      --shadow: 0 2px 10px rgba(60, 50, 30, 0.08);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Iowan Old Style", "Palatino Linotype", Georgia, "Times New Roman", serif;
      line-height: 1.55;
      font-size: 17px;
    }
    button, input, select, textarea { font-family: inherit; font-size: inherit; }

    .app { max-width: 1100px; margin: 0 auto; padding: 0 20px 80px; }

    /* Header */
    .site-header {
      text-align: center;
      padding: 30px 16px 18px;
    }
    .site-header h1 {
      margin: 0;
      font-size: 2.1rem;
      letter-spacing: 0.3px;
      color: var(--accent-dark);
    }
    .site-header .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 1.05rem; }
    .disclaimer {
      margin: 16px auto 0;
      max-width: 760px;
      background: #fff7e6;
      border: 1px solid #ecd9a6;
      color: #6e561f;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.9rem;
    }

    /* Cards & sections */
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px 24px;
      margin: 18px 0;
    }
    .card h2 { margin: 0 0 4px; color: var(--accent-dark); font-size: 1.4rem; }
    .card h3 { margin: 18px 0 6px; color: var(--accent); font-size: 1.12rem; }
    .card h4 { margin: 14px 0 4px; color: var(--ink); font-size: 1rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    .eyebrow { font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); font-weight: 600; }

    /* Form */
    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }
    .field label { font-size: 0.92rem; color: var(--muted); font-weight: 600; }
    .field input, .field select {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      color: var(--ink);
    }
    .field input:focus, .field select:focus { outline: 2px solid var(--accent-soft); border-color: var(--accent); }

    /* Buttons */
    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 9px 15px;
      border-radius: 9px;
      cursor: pointer;
      transition: transform .04s ease, background .15s ease, border-color .15s ease;
    }
    .btn:hover { background: #faf7f1; }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-ghost { background: transparent; }
    .btn-lg { padding: 14px 26px; font-size: 1.15rem; border-radius: 12px; }
    .btn-small { padding: 5px 12px; font-size: 0.85rem; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .btn-row .spacer { flex: 1; }

    /* Tabs */
    .tabs { display: flex; flex-wrap: wrap; gap: 6px; border-bottom: 2px solid var(--line); margin: 26px 0 4px; }
    .tab {
      border: none; background: transparent; cursor: pointer;
      padding: 12px 18px; font-size: 1.02rem; color: var(--muted);
      border-bottom: 3px solid transparent; margin-bottom: -2px; border-radius: 8px 8px 0 0;
    }
    .tab:hover { color: var(--accent); background: var(--accent-soft); }
    .tab.active { color: var(--accent-dark); border-bottom-color: var(--accent); font-weight: 700; }

    /* Student vs teacher visual separation */
    .student-scope { }
    .teacher-scope .card { border-left: 5px solid var(--teacher); background: linear-gradient(0deg, #fffdfb, #fffdfb); }
    .teacher-badge { display: inline-block; background: var(--teacher-soft); color: var(--teacher); border: 1px solid #e6cdbf; padding: 2px 9px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.04em; }

    .meta-pills { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 4px; }
    .pill { background: var(--accent-soft); color: var(--accent-dark); border-radius: 20px; padding: 4px 12px; font-size: 0.85rem; font-weight: 600; }
    .pill.teacher { background: var(--teacher-soft); color: var(--teacher); }

    ul.clean { margin: 6px 0; padding-left: 22px; }
    ul.clean li { margin: 4px 0; }
    .questions { background: var(--accent-soft); border-radius: 10px; padding: 12px 16px; margin-top: 14px; }
    .questions .eyebrow { color: var(--accent-dark); }
    .questions ol { margin: 6px 0 0; padding-left: 22px; }
    .questions ol li { margin: 5px 0; }

    /* Lab table */
    table.labs { width: 100%; border-collapse: collapse; margin-top: 8px; }
    table.labs th, table.labs td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); font-size: 0.96rem; }
    table.labs th { color: var(--muted); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.05em; }
    tr.abnormal td { background: var(--bad-soft); }
    .flag { color: var(--bad); font-weight: 700; }
    .flag.normal { color: var(--good); font-weight: 600; }

    .distractor { background: #fff4ec; border: 1px dashed #e3b58f; border-radius: 10px; padding: 10px 14px; margin-top: 12px; font-size: 0.96rem; }
    .vocab dt { font-weight: 700; color: var(--accent-dark); margin-top: 8px; }
    .vocab dd { margin: 2px 0 0; color: var(--ink); }

    .reveal-locked { text-align: center; padding: 24px; color: var(--muted); }

    /* Reveal mode */
    .reveal-wrap { }
    .progress-track { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 8px 0 18px; }
    .progress-step { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--line); color: var(--muted); font-size: 0.9rem; }
    .progress-step.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
    .progress-step.done { background: var(--accent-soft); color: var(--accent-dark); border-color: var(--accent-soft); }
    .reveal-card { min-height: 320px; }
    .reveal-card h2 { font-size: 1.9rem; }
    .reveal-card .reveal-body { font-size: 1.18rem; }
    .pause-box { background: #fff7e6; border: 2px solid #ecd9a6; border-radius: 12px; padding: 14px 18px; margin: 16px 0; }
    .pause-box .eyebrow { color: var(--gold); }
    .hypothesis-prompt { background: var(--accent-soft); border-radius: 12px; padding: 14px 18px; margin: 12px 0; }
    .reveal-nav { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 18px; }
    .teacher-notes { margin-top: 16px; border-top: 2px dashed var(--teacher); padding-top: 12px; }

    /* Collaboration: editable tables */
    .editable-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    .editable-table th, .editable-table td { border: 1px solid var(--line); padding: 6px; vertical-align: top; }
    .editable-table th { background: var(--accent-soft); color: var(--accent-dark); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .editable-table textarea { width: 100%; border: none; resize: vertical; min-height: 40px; background: transparent; color: var(--ink); }
    .editable-table textarea:focus { outline: 1px solid var(--accent-soft); }
    .editable-table select { width: 100%; border: 1px solid var(--line); border-radius: 6px; padding: 4px; }
    .row-x { color: var(--bad); cursor: pointer; border: none; background: transparent; font-size: 1.1rem; }
    .role-card { border: 1px solid var(--line); border-radius: 10px; padding: 12px 16px; margin: 8px 0; background: #fff; }
    .role-card strong { color: var(--accent-dark); }

    .saved-list { list-style: none; padding: 0; margin: 8px 0 0; }
    .saved-list li { display: flex; align-items: center; gap: 10px; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--line); }

    .small { font-size: 0.88rem; color: var(--muted); }
    .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--accent-dark); color: #fff; padding: 10px 18px; border-radius: 24px; box-shadow: var(--shadow); z-index: 50; }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      body { font-size: 16px; }
    }

    /* Print */
    @media print {
      body { background: #fff; }
      .no-print { display: none !important; }
      .app { max-width: none; padding: 0; }
      .card { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; page-break-inside: avoid; }
      .tabs, .site-header .disclaimer, .deploy-bar { display: none; }
      .teacher-scope .card { border-left: 4px solid #999; }
      table.labs th, table.labs td { border-color: #bbb; }
    }
  </style>
</head>

  <div id="root"></div>

  <script type="text/babel" data-presets="react">

   ============================================================ */

const SENTENCE_STARTERS = [
  "The evidence that supports this is…",
  "This clue suggests… because…",
  "I changed my mind when… because…",
  "This does not fit because…",
  "The mechanism behind this symptom is…",

  {

/* ============================================================
   GENERATION ENGINE
   generateCase(form) -> structured case object consumed by all views.
   Difficulty & length modifiers applied here. Generic fallback for
   any free-text condition. Swap in a real LLM at the marked boundary.
   ============================================================ */
function normalize(s) {
  return (s || "").toLowerCase().trim().replace(/[’']/g, "'").replace(/\s+/g, " ");
}

function findCondition(conditionText) {
  const n = normalize(conditionText);
  if (!n) return null;
  // exact alias match first
  for (const c of CONDITIONS) {
    if (c.aliases.some((a) => normalize(a) === n)) return c;
  }
  // partial/contains match
  for (const c of CONDITIONS) {
    if (c.aliases.some((a) => n.includes(normalize(a)) || normalize(a).includes(n))) return c;
  }
  return null;
}

function estTimeFromLength(length) {
  return length === "Full-class case" ? "Full class period (~50 minutes)" : "About 20 minutes";
}

// Build the generic fallback case for any unknown condition.
function buildGenericSpec(form) {
  const cond = form.condition || "the condition";
  const system = form.system || "Multiple systems";
  return {
    condition: form.condition || "Unknown condition",
    system,
    learningGoals: [
      `Connect the patient's symptoms to the ${system.toLowerCase()} system.`,
      `Explain the normal structure and function involved before reasoning about what goes wrong in ${cond}.`,
      "Use evidence and lab data to support a diagnosis.",
    ],
    patient: { age: "16-year-old", background: "previously healthy honors student", setting: `clinic visit after symptoms that point toward the ${system.toLowerCase()} system` },
    chiefComplaint: `A combination of symptoms that gradually raise concern about the ${system.toLowerCase()} system.`,
    symptoms: [
      `A main symptom commonly seen in ${cond}`,
      "A second related symptom",
      "Fatigue or discomfort that affects daily activity",
      "A change the patient or family noticed recently",
    ],
    curiosity: [
      "The symptoms do not point to one obvious cause at first.",
      "Something about the pattern invites students to ask more questions.",
    ],
    vitals: [
      { label: "Heart rate", value: "—", normal: "60–100 bpm", abnormal: false },
      { label: "Blood pressure", value: "—", normal: "≈120/80 mmHg", abnormal: false },
      { label: "Respiratory rate", value: "—", normal: "12–20 breaths/min", abnormal: false },
      { label: "Temperature", value: "—", normal: "36.5–37.5 °C", abnormal: false },
    ],
    history: [
      "Relevant past health information.",
      "Family history if appropriate.",
      "Recent illness, activity, diet, or exposure.",
    ],
    exposures: ["Any recent exposure, activity, or change worth noting."],
    exam: [
      `A physical exam finding that fits the ${system.toLowerCase()} system.`,
      "A second supporting finding.",
    ],
    distractor: "Include one finding that could point to a different, simpler explanation, then show why the rest of the evidence does not fit it.",
    labs: [
      { label: "Relevant test 1", value: "abnormal value", normal: "normal range", abnormal: true },
      { label: "Relevant test 2", value: "value", normal: "normal range", abnormal: true },
      { label: "Supporting test 3", value: "value", normal: "normal range", abnormal: false },
    ],
    mechanism: {
      focus: `The tissue, organ, or pathway of the ${system.toLowerCase()} system most affected by ${cond}.`,
      explanation: `Explain the normal function of the affected ${system.toLowerCase()} structure, then describe precisely what ${cond} disrupts and how that disruption produces each of the patient's symptoms. Connect the change at the tissue or cellular level to what the patient feels and to the abnormal lab values.`,
      vocab: [
        { term: "Key structure", def: "Define the main anatomical structure involved." },
        { term: "Key process", def: "Define the physiological process being disrupted." },
        { term: "Key marker", def: "Define an important lab value or sign." },
      ],
      task: `Draw or model the affected ${system.toLowerCase()} structure and annotate where ${cond} disrupts normal function.`,
    },
    diagnosis: `${cond} affecting the ${system.toLowerCase()} system.`,
    clueLinks: [
      "Early symptoms suggested the affected system.",
      "History and exam narrowed the possibilities.",
      "Lab data confirmed the diagnosis and ruled out alternatives.",
    ],
    alternatives: [
      { dx: "A common look-alike condition", why: "Does not match part of the evidence." },
      { dx: "A second plausible alternative", why: "Ruled out by a specific lab or finding." },
    ],
    management: [
      "General, education-only overview of how this condition is typically managed.",
      "Supportive care relevant to the affected system.",
    ],
    misconceptions: [
      { think: "Students may name the disease without explaining why.", address: "Require a mechanism-based justification using the evidence." },
      { think: "Students may fixate on the distractor clue.", address: "Have them weigh ALL evidence, not a single finding." },
      { think: "Students may ignore normal values.", address: "Normal results are also evidence and help rule things out." },
    ],
  };
}

function applyDifficulty(spec, difficulty) {
  // Returns a shallow-adjusted copy: number of labs shown, guidance, vocab depth.
  const out = { ...spec, labs: [...spec.labs], mechanism: { ...spec.mechanism, vocab: [...spec.mechanism.vocab] } };
  if (difficulty === "Introductory") {
    // fewer values, keep the clearest abnormal ones; more vocab support
    const abnormal = out.labs.filter((l) => l.abnormal);
    const some = abnormal.length ? abnormal.slice(0, 3) : out.labs.slice(0, 3);
    out.labs = some;
    out.difficultyNote = "Introductory: more obvious symptoms, fewer lab values, extra vocabulary support, and a clear link to the body system. Use the guided questions closely.";
  } else if (difficulty === "Challenge") {
    out.labs = out.labs.slice(0, 6);
    out.difficultyNote = "Challenge: subtler clues and realistic ambiguity. Students must interpret the data carefully and actively rule out the alternative diagnoses before committing.";
    out.ruleOutEmphasis = true;
  } else {
    out.labs = out.labs.slice(0, 5);
    out.difficultyNote = "Standard: moderate complexity with 3–5 key data points and some distractor information. Students interpret the evidence with light guidance.";
  }
  // Cap vocab to 5-10 (spec)
  if (out.mechanism.vocab.length > 8) out.mechanism.vocab = out.mechanism.vocab.slice(0, 8);
  return out;
}

function pacingPlan(length) {
  if (length === "Full-class case") {
    return [
      "Part I — The Initial Mystery: 5–8 minutes",
      "Part II — History & Physical Exam: 8–10 minutes",
      "Part III — Lab Data & Diagnostics: 10–15 minutes",
      "Part IV — Mechanism Clue: 10–15 minutes",
      "Diagnosis Reveal & Discussion: 10 minutes",
      "Exit ticket: 5 minutes",
    ];
  }
  return [
    "Part I — The Initial Mystery: 3 minutes",
    "Part II — History & Physical Exam: 4 minutes",
    "Part III — Lab Data & Diagnostics: 5 minutes",
    "Part IV — Mechanism Clue: 5 minutes",
    "Diagnosis Reveal & Synthesis: 3 minutes",
  ];
}

function rolesForFormat(format) {
  if (format === "Whole class discussion") return ROLES_WHOLE_CLASS;
  if (format === "Individual") {
    return [
      { name: "Investigator (you)", desc: "work through each clue, record your reasoning, and revise your hypothesis as evidence builds" },
    ];
  }
  return ROLES_SMALL_GROUP;
}

// MAIN ENTRY POINT
function generateCase(form) {
  // === AI HOOK BOUNDARY ===========================================
  // To use a real AI API later, replace the lines below with a call
  // that builds a prompt from `form`, requests JSON, and parses it
  // into the SAME shape returned here (meta, parts, teacherGuide,
  // collaboration, exitTicket). The rest of the app needs no changes.
  //   const data = await callLLM(buildPrompt(form));
  //   return shapeCase(data, form);
  // ================================================================
  const matched = findCondition(form.condition);
  const baseSpec = matched ? { ...matched } : buildGenericSpec(form);
  // If a known condition was matched, prefer the teacher's body-system choice label
  // but keep the authored content. Difficulty trims data.
  const spec = applyDifficulty(baseSpec, form.difficulty);

  const meta = {
    condition: spec.condition,
    system: form.system || spec.system,
    difficulty: form.difficulty,
    format: form.format,
    length: form.length,
    estTime: estTimeFromLength(form.length),
    learningGoals: spec.learningGoals,
    isSample: !!form.isSample,
    matched: !!matched,
  };

  const parts = {
    I: {
      title: "Part I — The Initial Mystery",
      patient: spec.patient,
      chiefComplaint: spec.chiefComplaint,
      symptoms: spec.symptoms,
      curiosity: spec.curiosity,
      questions: STUDENT_QUESTIONS.I,
    },
    II: {
      title: "Part II — History and Physical Exam",
      vitals: spec.vitals,
      history: spec.history,
      exposures: spec.exposures,
      exam: spec.exam,
      distractor: spec.distractor,
      questions: STUDENT_QUESTIONS.II,
    },
    III: {
      title: "Part III — Lab Data and Diagnostic Testing",
      labs: spec.labs,
      questions: STUDENT_QUESTIONS.III,
    },
    IV: {
      title: "Part IV — Mechanism Clue",
      mechanism: spec.mechanism,
      questions: STUDENT_QUESTIONS.IV,
    },
    V: {
      title: "Part V — Diagnosis Reveal and Synthesis",
      diagnosis: spec.diagnosis,
      clueLinks: spec.clueLinks,
      alternatives: spec.alternatives,
      management: spec.management,
      questions: STUDENT_QUESTIONS.V,
    },
  };

  const teacherGuide = {
    overview: {
      condition: spec.condition,
      system: meta.system,
      estTime: meta.estTime,
      difficulty: form.difficulty,
      difficultyNote: spec.difficultyNote,
      learningGoals: spec.learningGoals,
    },
    answerKey: [
      {
        part: "Part I — Initial Mystery",
        keyClues: spec.symptoms.slice(0, 3),
        notice: "Students should list the standout symptoms and propose which body systems could be involved.",
        hypotheses: "Expect broad, reasonable guesses; do not confirm or deny yet.",
        guide: "Push for 2–3 possible explanations and what information they want next.",
        watch: "Jumping to the final diagnosis with no evidence.",
      },
      {
        part: "Part II — History & Exam",
        keyClues: [...spec.history.slice(0, 2), ...spec.exam.slice(0, 1)],
        notice: "Risk factors, exposures, and exam findings that support or challenge early ideas.",
        hypotheses: "Hypotheses should narrow; the distractor may tempt some groups.",
        guide: "Ask which clues support vs challenge their hypothesis. Name the distractor explicitly: " + spec.distractor,
        watch: "Latching onto the distractor clue and ignoring the rest of the evidence.",
      },
      {
        part: "Part III — Lab Data",
        keyClues: spec.labs.filter((l) => l.abnormal).map((l) => `${l.label}: ${l.value} (normal ${l.normal})`),
        notice: "Which values are abnormal versus normal, and what each abnormal value implies.",
        hypotheses: "The diagnosis should now be strongly favored by most groups.",
        guide: "Have students state what process appears disrupted and why, using the numbers.",
        watch: "Ignoring normal values (they are evidence too) or being overwhelmed by numbers.",
      },
      {
        part: "Part IV — Mechanism",
        keyClues: [spec.mechanism.focus],
        notice: "The normal function being disrupted and how that explains the symptoms and labs.",
        hypotheses: "Students should now be able to defend one diagnosis on mechanism grounds.",
        guide: "Require a mechanism explanation, not just a disease name. Use the model/diagram task.",
        watch: "Naming the disease without explaining the underlying physiology.",
      },
    ],
    reasoning: [
      {
        clue: "Clue 1: Initial symptoms",
        think: "Students may think: " + (spec.curiosity[0] || "several systems could be involved."),
        suggests: "What this clue actually suggests: a starting set of body systems to consider — " + spec.symptoms.slice(0, 2).join("; ") + ".",
        uncertain: "What remains uncertain: the specific cause; multiple explanations are still open.",
      },
      {
        clue: "Clue 2: History and exam",
        think: "Students may think: the history points to one obvious cause (watch the distractor).",
        suggests: "What this clue actually suggests: risk factors and exam findings that narrow the list — " + spec.exam.slice(0, 2).join("; ") + ".",
        uncertain: "What remains uncertain: confirmation requires data; the distractor still needs to be ruled out.",
      },
      {
        clue: "Clue 3: Lab data",
        think: "Students may think: the abnormal numbers point somewhere — they must say where.",
        suggests: "What this clue actually suggests: " + (spec.labs.filter((l) => l.abnormal)[0] ? `${spec.labs.filter((l) => l.abnormal)[0].label} is abnormal, indicating the disrupted process.` : "the disrupted process."),
        uncertain: "What remains uncertain: the underlying mechanism — addressed in Part IV.",
      },
      {
        clue: "Clue 4: Mechanism",
        understand: "What students should now understand: " + spec.mechanism.focus + " — " + spec.mechanism.explanation.slice(0, 240) + "…",
        finalDx: "Final diagnosis: " + spec.diagnosis,
      },
    ],
    vocabulary: spec.mechanism.vocab,
    misconceptions: spec.misconceptions,
    differentiation: {
      support: [
        "Provide a word bank of the key vocabulary terms.",
        "Offer a partially completed evidence board to start.",
        "Use the guided student questions one at a time.",
      ],
      challenge: [
        "Ask students to rank the evidence by strength.",
        "Require them to rule out BOTH alternative diagnoses with specific evidence.",
        "Have them predict what would happen if the condition worsened.",
      ],
      sentenceStarters: SENTENCE_STARTERS,
    },
    pacing: pacingPlan(form.length),
  };

  const collaboration = {
    roles: rolesForFormat(form.format),
    format: form.format,
    discussionPrompts: DISCUSSION_PROMPTS,
    evidenceSeed: [
      { clue: "Part I symptoms", know: spec.symptoms.slice(0, 2).join("; "), means: "", diagnosis: "", confidence: "Low", questions: "What system is involved?" },
      { clue: "Part II history/exam", know: spec.exam.slice(0, 1).join("; "), means: "", diagnosis: "", confidence: "Low", questions: "Does this fit our hypothesis?" },
    ],
    hypothesisSeed: [
      { dx: spec.alternatives[0] ? spec.alternatives[0].dx : "Possible diagnosis", for: "", against: "", confidence: "Low" },
    ],
  };

  const exitTicket = [
    `In 2–3 sentences, name the most likely diagnosis for ${spec.condition.replace(/\s*\(.*\)/, "")} and the single strongest piece of evidence for it.`,
    "Explain the mechanism: what normal function was disrupted, and how did that cause the symptoms?",
    "Name one alternative diagnosis you ruled out and why.",
  ];

  return { meta, parts, teacherGuide, collaboration, exitTicket };
}

const REVEAL_STEPS = ["Clue 1 of 5", "Clue 2 of 5", "Clue 3 of 5", "Clue 4 of 5", "Diagnosis Reveal"];

function RevealMode({ c, step, setStep, showNotes, setShowNotes }) {
  const p = c.parts;
  const g = c.teacherGuide;
  const notesByStep = [
    g.answerKey[0], g.answerKey[1], g.answerKey[2], g.answerKey[3], null,
  ];
  const note = notesByStep[step];

  function body() {
    if (step === 0) {
      return (
        <div className="reveal-body">
          <p><strong>Patient:</strong> {p.I.patient.age}, {p.I.patient.background}.</p>
          <p><strong>Setting:</strong> {p.I.patient.setting}.</p>
          <p><strong>Chief complaint:</strong> {p.I.chiefComplaint}</p>
          <ul className="clean">{p.I.symptoms.map((s, i) => <li key={i}>{s}</li>)}</ul>
          <QuestionList questions={p.I.questions} />
        </div>
      );
    }
    if (step === 1) {
      return (
        <div className="reveal-body">
          <LabTable labs={p.II.vitals} />
          <h4>History & exposures</h4>
          <ul className="clean">{[...p.II.history, ...p.II.exposures].map((s, i) => <li key={i}>{s}</li>)}</ul>
          <h4>Exam</h4>
          <ul className="clean">{p.II.exam.map((s, i) => <li key={i}>{s}</li>)}</ul>
          <QuestionList questions={p.II.questions} />
        </div>
      );
    }
    if (step === 2) {
      return (
        <div className="reveal-body">
          <LabTable labs={p.III.labs} />
          <QuestionList questions={p.III.questions} />
        </div>
      );
    }
    if (step === 3) {
      return (
        <div className="reveal-body">
          <p><strong>Focus:</strong> {p.IV.mechanism.focus}</p>
          <p>{p.IV.mechanism.explanation}</p>
          <QuestionList questions={p.IV.questions} />
        </div>
      );
    }
    return (
      <div className="reveal-body">
        <h3>Diagnosis</h3>
        <p><strong>{p.V.diagnosis}</strong></p>
        <h4>How the clues pointed here</h4>
        <ul className="clean">{p.V.clueLinks.map((s, i) => <li key={i}>{s}</li>)}</ul>
        <QuestionList questions={p.V.questions} label="Synthesis questions" />
      </div>
    );
  }

  return (
    <div className="reveal-wrap">
      <div className="progress-track no-print">
        {REVEAL_STEPS.map((label, i) => (
          <div key={i} className={"progress-step " + (i === step ? "active" : i < step ? "done" : "")}>{label}</div>
        ))}
      </div>

      <div className="card reveal-card">
        <div className="eyebrow">{REVEAL_STEPS[step]}</div>
        <h2>{step < 4 ? REVEAL_STEPS[step] : "Diagnosis Reveal"}</h2>
        {body()}

        {step < 4 && (
          <div className="pause-box">
            <div className="eyebrow">Pause and Discuss</div>
            Talk it out as a group before revealing the next clue. What does this new information change?
          </div>
        )}
        <div className="hypothesis-prompt">
          <strong>Current hypothesis:</strong> What is your group's best diagnosis right now, and how confident are you (Low / Medium / High)?
        </div>

        {showNotes && note && (
          <div className="teacher-notes">
            <span className="teacher-badge">Teacher Notes</span>
            <ul className="clean">
              <li><strong>Key clues:</strong> {Array.isArray(note.keyClues) ? note.keyClues.join("; ") : note.keyClues}</li>
              <li><strong>Guide:</strong> {note.guide}</li>
              <li><strong>Watch for:</strong> {note.watch}</li>
            </ul>
          </div>
        )}
        {showNotes && step === 4 && (
          <div className="teacher-notes">
            <span className="teacher-badge">Teacher Notes</span>
            <p>Have students defend the diagnosis with at least three pieces of evidence and explain the mechanism in their own words.</p>
          </div>
        )}
      </div>

      <div className="reveal-nav no-print">
        <button className="btn" onClick={() => setStep(Math.max(0, step - 1))} disabled={step === 0}>← Go Back</button>
        {step < 4 ? (
          <button className="btn btn-primary btn-lg" onClick={() => setStep(Math.min(4, step + 1))}>Reveal Next Clue →</button>
        ) : (
          <button className="btn btn-primary btn-lg" disabled>Case Complete</button>
        )}
        <button className="btn" onClick={() => setStep(0)}>↺ Restart Case</button>
        <button className="btn btn-ghost" onClick={() => setShowNotes(!showNotes)}>{showNotes ? "Hide" : "Show"} Teacher Notes</button>
      </div>
    </div>
  );
}

function EvidenceBoard({ rows, setRows }) {
  function update(i, field, val) {
    const next = rows.map((r, idx) => (idx === i ? { ...r, [field]: val } : r));
    setRows(next);
  }
  function addRow() {
    setRows([...rows, { clue: "", know: "", means: "", diagnosis: "", confidence: "Low", questions: "" }]);
  }
  function removeRow(i) { setRows(rows.filter((_, idx) => idx !== i)); }
  return (
    <div>
      <table className="editable-table">
        <thead>
          <tr>
            <th>Clue</th><th>What we know</th><th>What it means</th><th>Possible diagnosis</th><th>Confidence</th><th>Open questions</th><th className="no-print"></th>
          </tr>
        </thead>
        <tbody>
          {rows.map((r, i) => (
            <tr key={i}>
              <td><textarea value={r.clue} onChange={(e) => update(i, "clue", e.target.value)} /></td>
              <td><textarea value={r.know} onChange={(e) => update(i, "know", e.target.value)} /></td>
              <td><textarea value={r.means} onChange={(e) => update(i, "means", e.target.value)} /></td>
              <td><textarea value={r.diagnosis} onChange={(e) => update(i, "diagnosis", e.target.value)} /></td>
              <td>
                <select value={r.confidence} onChange={(e) => update(i, "confidence", e.target.value)}>
                  <option>Low</option><option>Medium</option><option>High</option>
                </select>
              </td>
              <td><textarea value={r.questions} onChange={(e) => update(i, "questions", e.target.value)} /></td>
              <td className="no-print"><button className="row-x" title="Delete row" onClick={() => removeRow(i)}>×</button></td>
            </tr>
          ))}
        </tbody>
      </table>
      <div className="btn-row no-print"><button className="btn" onClick={addRow}>+ Add row</button></div>
    </div>
  );
}

function HypothesisTracker({ rows, setRows }) {
  function update(i, field, val) {
    setRows(rows.map((r, idx) => (idx === i ? { ...r, [field]: val } : r)));
  }
  function addRow() { setRows([...rows, { dx: "", for: "", against: "", confidence: "Low" }]); }
  function removeRow(i) { setRows(rows.filter((_, idx) => idx !== i)); }
  return (
    <div>
      <table className="editable-table">
        <thead>
          <tr><th>Diagnosis possibility</th><th>Evidence for</th><th>Evidence against</th><th>Confidence</th><th className="no-print"></th></tr>
        </thead>
        <tbody>
          {rows.map((r, i) => (
            <tr key={i}>
              <td><textarea value={r.dx} onChange={(e) => update(i, "dx", e.target.value)} /></td>
              <td><textarea value={r.for} onChange={(e) => update(i, "for", e.target.value)} /></td>
              <td><textarea value={r.against} onChange={(e) => update(i, "against", e.target.value)} /></td>
              <td>
                <select value={r.confidence} onChange={(e) => update(i, "confidence", e.target.value)}>
                  <option>Low</option><option>Medium</option><option>High</option>
                </select>
              </td>
              <td className="no-print"><button className="row-x" title="Delete row" onClick={() => removeRow(i)}>×</button></td>
            </tr>
          ))}
        </tbody>
      </table>
      <div className="btn-row no-print"><button className="btn" onClick={addRow}>+ Add diagnosis</button></div>
    </div>
  );
}

function CollaborationMode({ c, evidence, setEvidence, hypotheses, setHypotheses }) {
  const col = c.collaboration;
  return (
    <div>
      <div className="card">
        <h2>Collaboration Mode</h2>
        <p className="small">Roles below are tuned for: <strong>{col.format}</strong></p>

const DIFFICULTIES = ["Introductory", "Standard", "Challenge"];

          <label htmlFor="system">Body system</label>

        </div>
        <div className="field">

          </select>
        </div>
        <div className="field">

/* ============================================================
   ROOT APP
   ============================================================ */
const DEFAULT_FORM = {
  condition: "Cyanide poisoning",
  system: "Multiple systems",
  difficulty: "Standard",
  format: "Small group",
  length: "20-minute short case",
};
const EMPTY_FORM = {
  condition: "",
  system: "Cardiovascular",
  difficulty: "Standard",
  format: "Small group",
  length: "20-minute short case",
};
const TABS = ["Student Case", "Teacher Guide", "Reveal Mode", "Collaboration Mode"];
const LS_SAVED = "mcsg_saved_cases_v1";
const LS_LAST = "mcsg_last_form_v1";

function App() {
  const [form, setForm] = useState(DEFAULT_FORM);
  const [generated, setGenerated] = useState(() => generateCase({ ...DEFAULT_FORM, isSample: true }));
  const [activeTab, setActiveTab] = useState("Student Case");
  const [showDiagnosis, setShowDiagnosis] = useState(false);
  const [revealStep, setRevealStep] = useState(0);
  const [showNotes, setShowNotes] = useState(false);
  const [evidence, setEvidence] = useState(generated.collaboration.evidenceSeed);
  const [hypotheses, setHypotheses] = useState(generated.collaboration.hypothesisSeed);
  const [saved, setSaved] = useState([]);
  const [toast, setToast] = useState("");

  useEffect(() => {
    try {
      const s = JSON.parse(localStorage.getItem(LS_SAVED) || "[]");
      if (Array.isArray(s)) setSaved(s);
      const f = JSON.parse(localStorage.getItem(LS_LAST) || "null");
      if (f && f.condition) setForm(f);
    } catch (e) {}
  }, []);

  function flash(msg) {
    setToast(msg);
    window.clearTimeout(flash._t);
    flash._t = window.setTimeout(() => setToast(""), 1800);
  }

  function doGenerate() {
    const c = generateCase(form);
    setGenerated(c);
    setShowDiagnosis(false);
    setRevealStep(0);
    setShowNotes(false);
    setEvidence(c.collaboration.evidenceSeed);
    setHypotheses(c.collaboration.hypothesisSeed);
    try { localStorage.setItem(LS_LAST, JSON.stringify(form)); } catch (e) {}
    flash(c.meta.matched ? "Case generated" : "Case generated from template (condition not in library)");
  }

  async function copyText(text, label) {
    try {
      await navigator.clipboard.writeText(text);
      flash(label + " copied");
    } catch (e) {
      // Fallback for environments without clipboard permissions
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); flash(label + " copied"); }
      catch (err) { flash("Copy failed — select and copy manually"); }
      document.body.removeChild(ta);
    }
  }

  function resetForm() {
    setForm(EMPTY_FORM);
    flash("Form reset");
  }

  function loadSample() {
    setForm(DEFAULT_FORM);
    const c = generateCase({ ...DEFAULT_FORM, isSample: true });
    setGenerated(c);
    setShowDiagnosis(false); setRevealStep(0); setShowNotes(false);
    setEvidence(c.collaboration.evidenceSeed);
    setHypotheses(c.collaboration.hypothesisSeed);
    flash("Sample case loaded");
  }

  function saveCase() {
    const entry = {
      id: Date.now(),
      name: `${generated.meta.condition} — ${generated.meta.difficulty} (${new Date().toLocaleDateString()})`,
      form,
    };
    const next = [entry, ...saved].slice(0, 20);
    setSaved(next);
    try { localStorage.setItem(LS_SAVED, JSON.stringify(next)); } catch (e) {}
    flash("Case saved to this browser");
  }

  function loadSaved(entry) {
    setForm(entry.form);
    const c = generateCase(entry.form);
    setGenerated(c);
    setShowDiagnosis(false); setRevealStep(0); setShowNotes(false);
    setEvidence(c.collaboration.evidenceSeed);
    setHypotheses(c.collaboration.hypothesisSeed);
    flash("Loaded: " + entry.name);
  }

  function deleteSaved(id) {
    const next = saved.filter((s) => s.id !== id);
    setSaved(next);
    try { localStorage.setItem(LS_SAVED, JSON.stringify(next)); } catch (e) {}
  }

  return (
    <div className="app">
      <header className="site-header">
        <h1>Mystery Case Study Generator</h1>
        <p className="subtitle">Progressive diagnosis cases for 12th-grade Honors Anatomy &amp; Physiology</p>
        <div className="disclaimer">For classroom education only. This tool does not provide real medical advice.</div>
      </header>

      <TeacherForm form={form} setForm={setForm} onGenerate={doGenerate} />

      <div className="card no-print">
        <div className="eyebrow">Output Controls</div>
        <div className="btn-row">
          <button className="btn" onClick={() => copyText(studentCaseText(generated), "Student version")}>Copy Student Version</button>
          <button className="btn" onClick={() => copyText(teacherGuideText(generated), "Teacher guide")}>Copy Teacher Guide</button>
          <button className="btn" onClick={() => copyText(revealSlidesText(generated), "Reveal slides text")}>Copy Reveal Slides Text</button>
          <button className="btn" onClick={() => window.print()}>Print Case</button>
          <button className="btn" onClick={resetForm}>Reset Form</button>
          <button className="btn" onClick={loadSample}>Load Sample Case</button>
        </div>
        <div className="btn-row">
          <button className="btn" onClick={saveCase}>Save Case to Browser</button>
          {saved.length > 0 && <span className="small" style={{ alignSelf: "center" }}>{saved.length} saved case(s):</span>}
        </div>
        {saved.length > 0 && (
          <ul className="saved-list">
            {saved.map((s) => (
              <li key={s.id}>
                <span className="small">{s.name}</span>
                <span>
                  <button className="btn btn-small" onClick={() => loadSaved(s)}>Load</button>{" "}
                  <button className="row-x" title="Delete" onClick={() => deleteSaved(s.id)}>×</button>
                </span>
              </li>
            ))}
          </ul>
        )}
      </div>

      <div className="tabs no-print">
        {TABS.map((t) => (
          <button key={t} className={"tab " + (activeTab === t ? "active" : "")} onClick={() => setActiveTab(t)}>{t}</button>
        ))}
      </div>

      {activeTab === "Student Case" && (
        <StudentCase c={generated} showDiagnosis={showDiagnosis} setShowDiagnosis={setShowDiagnosis} />
      )}
      {activeTab === "Teacher Guide" && <TeacherGuide c={generated} />}
      {activeTab === "Reveal Mode" && (
        <RevealMode c={generated} step={revealStep} setStep={setRevealStep} showNotes={showNotes} setShowNotes={setShowNotes} />
      )}
      {activeTab === "Collaboration Mode" && (
        <CollaborationMode c={generated} evidence={evidence} setEvidence={setEvidence} hypotheses={hypotheses} setHypotheses={setHypotheses} />
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
